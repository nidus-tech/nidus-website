<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nidus — Applied AI for defense manufacturing at scale.">
  <title>Nidus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --fg: #000000;
      --muted-fg: #525252;
      --font-display: "Playfair Display", Georgia, serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      /* 100dvh accounts for mobile browser chrome (address bar) */
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.02;
      pointer-events: none;
      z-index: 9999;
    }

    .splash {
      text-align: center;
      padding: 2rem;
    }

    .name-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(5rem, 18vw, 11rem);
      letter-spacing: -0.05em;
      line-height: 1;
      display: block;
      clip-path: inset(100% 0 0 0);
      animation: b-build 1s cubic-bezier(0.4, 0, 0.6, 1) 0.3s forwards;
    }

    @keyframes b-build {
      to { clip-path: inset(0% 0 0 0); }
    }

    /* Cyan print-head line that tracks the deposit edge */
    .b-head {
      position: absolute;
      inset: auto -8px auto -8px;
      height: 2px;
      top: 100%;
      pointer-events: none;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(80,200,255,0.4) 15%,
        rgba(140,230,255,1) 50%,
        rgba(80,200,255,0.4) 85%,
        transparent 100%
      );
      box-shadow:
        0 0 5px 2px rgba(100,210,255,0.8),
        0 0 14px 5px rgba(80,190,255,0.3);
      animation: b-head 1s cubic-bezier(0.4, 0, 0.6, 1) 0.3s forwards;
    }

    @keyframes b-head {
      from { top: 100%; opacity: 1; }
      92%  { opacity: 0.7; }
      to   { top: 0%;   opacity: 0; }
    }

    .deco {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .deco-rule {
      width: 4rem;
      height: 3px;
      background: var(--fg);
    }

    .deco-square {
      width: 9px;
      height: 9px;
      border: 2px solid var(--fg);
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-fg);
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
    }

    .links a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg);
      text-decoration: none;
      /* 44px min touch target */
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: border-color 100ms;
    }

    .links a:hover {
      border-bottom-color: var(--fg);
    }

    .links a:focus-visible {
      outline: 3px solid var(--fg);
      outline-offset: 3px;
    }

    .descriptor {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      right: 2rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-fg);
      text-align: left;
      max-width: 28rem;
      line-height: 1.6;
    }

    /* Deco, tagline, links fade in after the build */
    .deco    { opacity: 0; animation: fade-in 0.35s ease 1.4s forwards; }
    .tagline { opacity: 0; animation: fade-up 0.4s ease  1.6s forwards; }
    .links   { opacity: 0; animation: fade-up 0.4s ease  1.8s forwards; }

    @keyframes fade-in { to { opacity: 1; } }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Coordinate HUD — top right corner (from Option C) */
    .hud {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      color: rgba(160, 160, 220, 0.75);
      line-height: 2;
      pointer-events: none;
      opacity: 0;
      animation: fade-in 0.3s ease 0.2s forwards, hud-out 0.4s ease 2.2s forwards;
    }

    @keyframes hud-out { to { opacity: 0; } }

    @media (max-width: 480px) {
      .tagline {
        letter-spacing: 0.05em;
        margin-bottom: 2rem;
      }

      .links {
        gap: 2rem;
      }

      .descriptor {
        text-align: center;
        left: 1.5rem;
        right: 1.5rem;
        bottom: 1.5rem;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="hud" aria-hidden="true">
    X&nbsp;+000.00<br>
    Y&nbsp;+000.00<br>
    Z&nbsp;+000.00
  </div>

  <main class="splash">
    <div class="name-wrap">
      <span class="name">NIDUS</span>
      <div class="b-head" aria-hidden="true"></div>
    </div>
    <div class="deco" aria-hidden="true">
      <div class="deco-rule"></div>
      <div class="deco-square"></div>
    </div>
    <p class="tagline">Applied AI &mdash; Manufacturing &mdash; Defense</p>
    <nav class="links">
      <a href="/thesis">Thesis</a>
      <a href="/careers">Careers</a>
    </nav>
  </main>
  <p class="descriptor">Modular, software-defined manufacturing systems<br>powered by foundational robotics AI.</p>
</body>
</html>
