<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nidus — Applied AI for defense manufacturing at scale.">
  <title>Nidus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --fg: #000000;
      --muted-fg: #525252;
      --font-display: "Orbitron", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      /* 100dvh accounts for mobile browser chrome (address bar) */
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.02;
      pointer-events: none;
      z-index: 9999;
    }

    .splash {
      text-align: center;
      padding: 2rem;
    }

    .name-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(3.5rem, 13vw, 8rem);
      letter-spacing: -0.02em;
      line-height: 1;
      display: block;
    }

    /* Each letter reveals left → right in sync with the nozzle sweep */
    .letter {
      display: inline-block;
      clip-path: inset(0 100% 0 0);
      animation: b-build 0.42s linear calc(0.42s + var(--i) * 0.358s) forwards;
    }

    @keyframes b-build {
      to { clip-path: inset(0 0% 0 0); }
    }

    /* Vertical print-head nozzle tracks left → right across the letters */
    .b-head {
      position: absolute;
      top: 0;
      bottom: 0;
      left: -4px;
      width: 3px;
      pointer-events: none;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(80,200,255,0.4) 15%,
        rgba(140,230,255,1) 50%,
        rgba(80,200,255,0.4) 85%,
        transparent 100%
      );
      box-shadow:
        0 0 5px 2px rgba(100,210,255,0.8),
        0 0 14px 5px rgba(80,190,255,0.3);
      animation: b-head 1.79s linear 0.42s forwards;
    }

    @keyframes b-head {
      from { left: -4px;            opacity: 1; }
      90%  {                         opacity: 1; }
      to   { left: calc(100% + 4px); opacity: 0; }
    }

    .deco {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .deco-rule {
      width: 4rem;
      height: 3px;
      background: var(--fg);
    }

    .deco-square {
      width: 9px;
      height: 9px;
      border: 2px solid var(--fg);
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-fg);
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
    }

    .links a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg);
      text-decoration: none;
      /* 44px min touch target */
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: border-color 100ms;
    }

    .links a:hover {
      border-bottom-color: var(--fg);
    }

    .links a:focus-visible {
      outline: 3px solid var(--fg);
      outline-offset: 3px;
    }

    .descriptor {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-fg);
      text-align: left;
      max-width: 28rem;
      line-height: 1.6;
    }

    .contact-origin,
    .contact-link {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-fg);
      text-align: right;
      line-height: 1.6;
    }

    /* Stack both in bottom-right on desktop */
    .contact-origin { bottom: 3.8rem; }
    .contact-link   { bottom: 2rem; }

    .contact-link a {
      color: var(--muted-fg);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 100ms;
    }

    .contact-link a:hover {
      border-bottom-color: var(--muted-fg);
    }

    /* Deco, tagline, links fade in after all letters are built (~1.63s) */
    .deco    { opacity: 0; animation: fade-in 0.245s ease 2.52s forwards; }
    .tagline { opacity: 0; animation: fade-up 0.28s ease  2.8s forwards; }
    .links   { opacity: 0; animation: fade-up 0.28s ease  3.08s forwards; }

    @keyframes fade-in { to { opacity: 1; } }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Coordinate HUD — top right corner (from Option C) */
    .hud {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      color: rgba(160, 160, 220, 0.75);
      line-height: 2;
      pointer-events: none;
      opacity: 0;
      animation: fade-in 0.3s ease 0.2s forwards, hud-out 0.4s ease 10s forwards;
    }

    @keyframes hud-out { to { opacity: 0; } }

    @media (max-width: 480px) {
      .tagline {
        letter-spacing: 0.05em;
        margin-bottom: 2rem;
      }

      .links {
        gap: 2rem;
      }

      /* Descriptor sits just above the bottom row */
      .descriptor {
        left: 1.5rem;
        right: 1.5rem;
        bottom: 3.8rem;
        max-width: none;
        text-align: center;
      }

      /* Built in NYC — bottom left */
      .contact-origin {
        top: auto;
        bottom: 1.5rem;
        left: 1.5rem;
        right: auto;
        text-align: left;
        font-size: 0.6rem;
      }

      /* Contact Us — bottom right */
      .contact-link {
        bottom: 1.5rem;
        right: 1.5rem;
        left: auto;
        text-align: right;
        font-size: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="hud" aria-hidden="true">
    X&nbsp;<span id="hud-x">+000.00</span><br>
    Y&nbsp;<span id="hud-y">+025.40</span><br>
    Z&nbsp;<span id="hud-z">+000.00</span>
  </div>

  <main class="splash">
    <div class="name-wrap">
      <span class="name"><span class="letter" style="--i:0">N</span><span class="letter" style="--i:1">I</span><span class="letter" style="--i:2">D</span><span class="letter" style="--i:3">U</span><span class="letter" style="--i:4">S</span></span>
      <div class="b-head" aria-hidden="true"></div>
    </div>
    <div class="deco" aria-hidden="true">
      <div class="deco-rule"></div>
      <div class="deco-square"></div>
    </div>
    <p class="tagline">Applied AI &mdash; Manufacturing &mdash; Defense</p>
    <nav class="links">
      <a href="/thesis">Thesis</a>
      <a href="/careers">Careers</a>
    </nav>
  </main>
  <p class="descriptor">AI-powered manufacturing systems to supercharge America's industrial base,<br>powered by foundational robotics models.</p>
  <p class="contact-origin">Built in NYC</p>
  <p class="contact-link"><a href="mailto:info@nidus.tech?subject=Question%20about%20Nidus">Contact us</a></p>

  <script>
    (function () {
      var X_MAX = 152.40, Z_MAX = 2.40;
      var DELAY = 600, DUR = 2560; // match CSS delays in ms
      var xEl = document.getElementById('hud-x');
      var zEl = document.getElementById('hud-z');

      function fmt(n) {
        var parts = n.toFixed(2).split('.');
        return '+' + parts[0].padStart(3, '0') + '.' + parts[1];
      }

      setTimeout(function () {
        var t0 = performance.now();
        function tick(now) {
          var t = Math.min((now - t0) / DUR, 1);
          xEl.textContent = fmt(X_MAX * t);
          zEl.textContent = fmt(Z_MAX * t);
          if (t < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }, DELAY);
    })();
  </script>
</body>
</html>
